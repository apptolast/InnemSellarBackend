name: Generate Documentation

on:
  push:
    branches:
      - main

jobs:
  generate-docs:
    name: Generate and Publish Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            inem-sellar-backend/target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('inem-sellar-backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-doc-

      - name: Install system dependencies
        run: sudo apt-get update -q && sudo apt-get install -y -q pkg-config libssl-dev

      - name: Build rustdoc
        working-directory: inem-sellar-backend
        run: cargo doc --no-deps 2>&1

      - name: Copy rustdoc output
        run: |
          mkdir -p docs/api-reference
          cp -r inem-sellar-backend/target/doc/. docs/api-reference/

      - name: Commit and push documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
          else
            git commit -m "docs: regenerate API reference [skip ci]"
            git push
          fi
