## Estructura del proyecto

```
src/
‚îú‚îÄ‚îÄ main.rs              ‚Äî Punto de entrada, configura Salvo y arranca el servidor
‚îú‚îÄ‚îÄ config/              ‚Äî Carga de variables de entorno con dotenvy/envy
‚îú‚îÄ‚îÄ db/                  ‚Äî Pool de conexion SeaORM a PostgreSQL
‚îú‚îÄ‚îÄ errors/              ‚Äî Tipos de error propios con thiserror
‚îú‚îÄ‚îÄ handlers/            ‚Äî Funciones HTTP (reciben Request, devuelven Response)
‚îú‚îÄ‚îÄ middleware/          ‚Äî Auth JWT, logging, CORS
‚îú‚îÄ‚îÄ models/              ‚Äî Structs que mapean a tablas PostgreSQL (SeaORM entities)
‚îú‚îÄ‚îÄ repositories/        ‚Äî Traits + implementaciones de acceso a datos
‚îú‚îÄ‚îÄ routes/              ‚Äî Definicion del arbol de rutas con Salvo Router
‚îî‚îÄ‚îÄ services/            ‚Äî Logica de negocio
```

