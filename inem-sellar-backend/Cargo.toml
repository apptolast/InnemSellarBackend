[package]
name = "inem-sellar-backend"
version = "0.1.0"
edition = "2024"

[dependencies]
salvo = "0.91.1"
tokio = { version = "1", features = ["macros"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
sqlx = { version = "0.8", features = ["postgres", "runtime-tokio", "macros"] }
serde = { version = "1" }
serde_json = "1"
dotenvy = "0.15.7"
envy = "0.4.2"